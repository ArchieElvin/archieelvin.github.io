<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 多格式预览工具</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #333; }
        #container { width: 100vw; height: 100vh; }
        .ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.9); padding: 20px;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .upload-btn {
            background: #007bff; color: white; padding: 10px 15px;
            border-radius: 4px; cursor: pointer; display: inline-block;
        }
        #file-input { display: none; }
        .info { margin-top: 10px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="ui-panel">
    <label class="upload-btn" for="file-input">上传模型 (GLB/OBJ)</label>
    <input type="file" id="file-input" accept=".glb,.gltf,.obj">
    <div class="info">支持 .glb, .gltf, .obj (白模)</div>
    <div id="status" class="info"></div>
</div>

<div id="container"></div>

<!-- 使用 Importmap 管理依赖 -->
<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

    // --- 场景初始化 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xeeeeee);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(2, 2, 2);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('container').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    
    // 灯光
    const light = new THREE.AmbientLight(0xffffff, 1);
    scene.add(light);
    const dirLight = new THREE.DirectionalLight(0xffffff, 2);
    dirLight.position.set(5, 5, 5);
    scene.add(dirLight);

    let currentModel = null;

    // --- 加载逻辑 ---
    const gltfLoader = new GLTFLoader();
    const objLoader = new OBJLoader();

    document.getElementById('file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const url = URL.createObjectURL(file);
        const extension = file.name.split('.').pop().toLowerCase();
        
        document.getElementById('status').innerText = "加载中...";

        // 清除旧模型
        if (currentModel) scene.remove(currentModel);

        if (extension === 'glb' || extension === 'gltf') {
            gltfLoader.load(url, (gltf) => {
                currentModel = gltf.scene;
                setupModel();
            });
        } else if (extension === 'obj') {
            objLoader.load(url, (obj) => {
                currentModel = obj;
                setupModel();
            });
        }
    });

    function setupModel() {
        scene.add(currentModel);
        
        // 自动缩放和居中模型
        const box = new THREE.Box3().setFromObject(currentModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        
        currentModel.position.x += (currentModel.position.x - center.x);
        currentModel.position.y += (currentModel.position.y - center.y);
        currentModel.position.z += (currentModel.position.z - center.z);
        
        const maxDim = Math.max(size.x, size.y, size.z);
        camera.position.set(maxDim, maxDim, maxDim);
        controls.update();
        
        document.getElementById('status').innerText = "加载完成";
    }

    // 动画循环
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // 窗口自适应
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
