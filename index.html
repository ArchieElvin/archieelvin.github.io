<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBJ+MTL 专业预览器</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #232323; }
        #container { width: 100vw; height: 100vh; }
        
        .ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.95); padding: 25px;
            border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            max-width: 300px; z-index: 100;
        }

        .upload-area {
            border: 2px dashed #007bff;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .upload-area:hover { background: #eef6ff; }
        
        h3 { margin-top: 0; color: #333; font-size: 18px; }
        p { font-size: 13px; color: #666; line-height: 1.6; }
        
        .file-list {
            margin-top: 15px;
            font-size: 12px;
            max-height: 100px;
            overflow-y: auto;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        #file-input { display: none; }
        
        .status-tag {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            background: #eee;
        }
    </style>
</head>
<body>

<div class="ui-panel">
    <h3>OBJ 材质预览器</h3>
    <p>请同时选中并上传 <b>.obj</b> 和 <b>.mtl</b> 文件（如有贴图文件也请一并选中）。</p>
    
    <label class="upload-area" for="file-input">
        <strong>点击或拖拽上传</strong>
        <div class="info">选入所有相关文件</div>
    </label>
    <input type="file" id="file-input" multiple accept=".obj,.mtl,.png,.jpg,.jpeg">
    
    <div id="file-names" class="file-list"></div>
    <div id="status" class="status-tag">等待上传...</div>
</div>

<div id="container"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

    // --- 初始化场景 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x333333);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(5, 5, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('container').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    
    // 灯光设置
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(10, 10, 10);
    scene.add(dirLight);

    let currentModel = null;

    // --- 文件处理核心逻辑 ---
    document.getElementById('file-input').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        const fileMap = {};
        let objFile = null;
        let mtlFile = null;

        const listContainer = document.getElementById('file-names');
        listContainer.innerHTML = '';
        
        // 1. 整理文件索引
        files.forEach(file => {
            fileMap[file.name] = file;
            const item = document.createElement('div');
            item.textContent = `📄 ${file.name}`;
            listContainer.appendChild(item);

            if (file.name.toLowerCase().endsWith('.obj')) objFile = file;
            if (file.name.toLowerCase().endsWith('.mtl')) mtlFile = file;
        });

        if (!objFile) {
            alert("未找到 .obj 文件！");
            return;
        }

        const status = document.getElementById('status');
        status.innerText = "正在解析材质...";

        // 2. 创建自定义资源管理器（解决文件引用问题）
        const manager = new THREE.LoadingManager();
        const objectURLs = [];
        
        manager.setURLModifier((url) => {
            // 将模型内部引用的文件名转换为本地 Blob URL
            const fileName = url.split('/').pop();
            if (fileMap[fileName]) {
                const blobURL = URL.createObjectURL(fileMap[fileName]);
                objectURLs.push(blobURL);
                return blobURL;
            }
            return url;
        });

        // 3. 加载逻辑
        try {
            if (currentModel) scene.remove(currentModel);

            const loadModel = (materials = null) => {
                const objLoader = new OBJLoader(manager);
                if (materials) objLoader.setMaterials(materials);
                
                const objUrl = URL.createObjectURL(objFile);
                objectURLs.push(objUrl);

                objLoader.load(objUrl, (object) => {
                    currentModel = object;
                    setupModel();
                    status.innerText = "渲染成功";
                    // 清理不再需要的 URL
                    objectURLs.forEach(url => URL.revokeObjectURL(url));
                });
            };

            if (mtlFile) {
                const mtlLoader = new MTLLoader(manager);
                const mtlUrl = URL.createObjectURL(mtlFile);
                objectURLs.push(mtlUrl);

                mtlLoader.load(mtlUrl, (materials) => {
                    materials.preload();
                    loadModel(materials);
                });
            } else {
                loadModel(); // 只有 OBJ 时降级为白模
                status.innerText = "仅加载 OBJ (无材质)";
            }

        } catch (err) {
            status.innerText = "错误: " + err.message;
        }
    });

    function setupModel() {
        scene.add(currentModel);
        
        // 自动居中与缩放
        const box = new THREE.Box3().setFromObject(currentModel);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        
        currentModel.position.x += (currentModel.position.x - center.x);
        currentModel.position.y += (currentModel.position.y - center.y);
        currentModel.position.z += (currentModel.position.z - center.z);
        
        const maxDim = Math.max(size.x, size.y, size.z);
        camera.position.set(maxDim * 1.5, maxDim * 1.5, maxDim * 1.5);
        camera.lookAt(0, 0, 0);
        controls.update();
    }

    // 渲染循环
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
